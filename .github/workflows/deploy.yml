name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-2
  DEPLOY_PATH: /var/www/jv-cricket-auction

jobs:
  deploy:
    name: Build & Deploy to AWS EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── AWS Authentication ──────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Verify AWS Connection ───────────────────
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # ── Deploy via SSH to EC2 ───────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 15m
          script: |
            set -e

            cd ${{ env.DEPLOY_PATH }}

            # Pull latest code
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Write production .env
            echo "🔧 Writing production environment..."
            cat > .env <<'ENVEOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            MANAGER_EMAIL=${{ secrets.MANAGER_EMAIL }}
            MANAGER_PASSWORD=${{ secrets.MANAGER_PASSWORD }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_REGION=ap-south-2
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            ENVEOF

            # Build and deploy containers
            echo "🏗️ Building and deploying..."
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            # Cleanup
            docker image prune -f

            # Health check
            echo "🏥 Running health check..."
            sleep 15
            for i in $(seq 1 12); do
              if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
                echo "✅ Backend is healthy!"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "❌ Health check failed after 60s"
                docker compose -f docker-compose.prod.yml logs backend --tail 50
                exit 1
              fi
              echo "⏳ Waiting for backend... ($i/12)"
              sleep 5
            done

            echo "🚀 Deployment complete!"

      # ── Post-deploy: Invalidate CDN cache if needed ──
      - name: Verify S3 Bucket
        run: |
          echo "📦 Verifying S3 bucket..."
          aws s3 ls s3://${{ secrets.AWS_S3_BUCKET }} --region ${{ env.AWS_REGION }} || echo "Bucket empty or not yet created"
          echo "✅ AWS integration verified"
